name: Build AntiSpoof

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build Full Version with Maven
      run: mvn -B package --file pom.xml -P full

    - name: Build Lite Version with Maven
      run: mvn -B package --file pom.xml -P lite

    - name: Collect Libraries for Skidfuscator
      run: |
        mkdir -p libs

        mvn dependency:copy-dependencies -DoutputDirectory=libs -DincludeScope=compile
        mvn dependency:copy-dependencies -DoutputDirectory=libs -DincludeScope=provided

        curl -sL https://api.papermc.io/v2/projects/paper/versions/1.21/builds/130/downloads/paper-1.21-130.jar -o paper-full.jar

        mkdir -p paper-tmp
        cd paper-tmp
        jar xf ../paper-full.jar
        find . -name "*.jar" | while read f; do
          cp "$f" "../libs/" 2>/dev/null || true
        done
        cd ..

        cp paper-full.jar libs/paper.jar

    - name: Download Skidfuscator
      run: |
        curl -sL https://raw.githubusercontent.com/skidfuscatordev/skidfuscator-java-obfuscator/refs/heads/master/scripts/install.sh | bash

    - name: Create Skidfuscator Config
      run: |
        cat > skid.conf << 'EOF'
        {
          exempt: [
            "com/gigazelensky/antispoof/AntiSpoof"
          ]
          transformers: {
            stringEncryption: { enabled: true }
            flowObfuscation: { enabled: true }
            numberMutation: { enabled: true }
            referenceObfuscation: { enabled: true }
            renamer: { enabled: true }
          }
        }
        EOF

    - name: Obfuscate Full Version
      run: |
        java -Xmx2G -jar ~/.skidfuscator/skidfuscator.jar obfuscate \
          target/antispoof-1.4.7.1.jar \
          -o target/antispoof-1.4.7.1-obf.jar \
          -li=libs \
          --config skid.conf || true
        if [ ! -f target/antispoof-1.4.7.1-obf.jar ]; then
          echo "Obfuscation failed - output file not found"
          exit 1
        fi
        mv target/antispoof-1.4.7.1-obf.jar target/antispoof-1.4.7.1.jar

    - name: Obfuscate Lite Version
      run: |
        java -Xmx2G -jar ~/.skidfuscator/skidfuscator.jar obfuscate \
          target/antispoof-lite-1.4.7.1.jar \
          -o target/antispoof-lite-1.4.7.1-obf.jar \
          -li=libs \
          --config skid.conf || true
        if [ ! -f target/antispoof-lite-1.4.7.1-obf.jar ]; then
          echo "Obfuscation failed - output file not found"
          exit 1
        fi
        mv target/antispoof-lite-1.4.7.1-obf.jar target/antispoof-lite-1.4.7.1.jar

    - name: Upload Full Version Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AntiSpoof-Full
        path: target/antispoof-1.4.7.1.jar

    - name: Upload Lite Version Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AntiSpoof-Lite
        path: target/antispoof-lite-1.4.7.1.jar

    - name: Publish to GitHub Packages
      if: github.event_name == 'release'
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Deploy to GitHub Packages
      if: github.event_name == 'release'
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
