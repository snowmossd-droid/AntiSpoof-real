name: Build AntiSpoof

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build Full Version with Maven
      run: mvn -B package --file pom.xml -P full

    - name: Build Lite Version with Maven
      run: mvn -B package --file pom.xml -P lite

    - name: Download ProGuard
      run: |
        mvn dependency:copy \
          -Dartifact=com.guardsquare:proguard-base:7.5.0:jar \
          -DoutputDirectory=. \
          -Dmdep.stripVersion=true
        mkdir -p proguard/lib
        mv proguard-base.jar proguard/lib/proguard.jar

    - name: Create ProGuard Config
      run: |
        JRT=$(java -XshowSettings:property -version 2>&1 | grep java.home | awk '{print $3}')

        cat > proguard.pro << EOF
        -injars target/antispoof-1.4.7.1.jar
        -outjars target/antispoof-1.4.7.1-obf.jar
        -libraryjars $JRT/lib/rt.jar
        -dontwarn **
        -keepattributes *Annotation*,Signature,Exceptions
        -keep class com.gigazelensky.antispoof.AntiSpoofPlugin {
            public *;
        }
        -keep class * implements org.bukkit.plugin.Plugin
        -keep class * implements org.bukkit.event.Listener
        -keep class * implements org.bukkit.command.CommandExecutor
        -keepclassmembers class * {
            @org.bukkit.event.EventHandler *;
        }
        -repackageclasses 'a'
        -allowaccessmodification
        -optimizationpasses 3
        EOF

    - name: Upload Full Version Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AntiSpoof-Full
        path: target/antispoof-1.4.7.1.jar

    - name: Upload Lite Version Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AntiSpoof-Lite
        path: target/antispoof-lite-1.4.7.1.jar

    - name: Publish to GitHub Packages
      if: github.event_name == 'release'
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Deploy to GitHub Packages
      if: github.event_name == 'release'
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
