name: Build AntiSpoof

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build Full Version with Maven
      run: mvn -B package --file pom.xml -P full

    - name: Build Lite Version with Maven
      run: mvn -B package --file pom.xml -P lite

    - name: Download ProGuard
      run: |
        mvn dependency:copy \
          -Dartifact=com.guardsquare:proguard-base:7.5.0:jar:standalone \
          -DoutputDirectory=. \
          -Dmdep.stripVersion=true
        mkdir -p proguard/lib
        mv proguard-base-standalone.jar proguard/lib/proguard.jar

    - name: Collect Libraries
      run: |
        mkdir -p libs
        mvn dependency:copy-dependencies -DoutputDirectory=libs -DincludeScope=compile
        mvn dependency:copy-dependencies -DoutputDirectory=libs -DincludeScope=provided
        curl -sL https://api.papermc.io/v2/projects/paper/versions/1.21/builds/130/downloads/paper-1.21-130.jar -o libs/paper.jar

    - name: Obfuscate Full Version
      run: |
        LIBPATH=$(find libs -name "*.jar" | sed 's/^/-libraryjars /' | tr '\n' ' ')
        java -jar proguard/lib/proguard.jar \
          -injars target/antispoof-1.4.7.1.jar \
          -outjars target/antispoof-1.4.7.1-obf.jar \
          $LIBPATH \
          -dontwarn '**' \
          -keepattributes '*Annotation*,Signature,Exceptions' \
          -keep 'class com.gigazelensky.antispoof.AntiSpoofPlugin { public *; }' \
          -keep 'class * implements org.bukkit.plugin.Plugin' \
          -keep 'class * implements org.bukkit.event.Listener' \
          -keep 'class * implements org.bukkit.command.CommandExecutor' \
          -keepclassmembers 'class * { @org.bukkit.event.EventHandler *; }' \
          -repackageclasses 'a' \
          -allowaccessmodification \
          -optimizationpasses 3
        mv target/antispoof-1.4.7.1-obf.jar target/antispoof-1.4.7.1.jar

    - name: Obfuscate Lite Version
      run: |
        LIBPATH=$(find libs -name "*.jar" | sed 's/^/-libraryjars /' | tr '\n' ' ')
        java -jar proguard/lib/proguard.jar \
          -injars target/antispoof-lite-1.4.7.1.jar \
          -outjars target/antispoof-lite-1.4.7.1-obf.jar \
          $LIBPATH \
          -dontwarn '**' \
          -keepattributes '*Annotation*,Signature,Exceptions' \
          -keep 'class com.gigazelensky.antispoof.AntiSpoofPlugin { public *; }' \
          -keep 'class * implements org.bukkit.plugin.Plugin' \
          -keep 'class * implements org.bukkit.event.Listener' \
          -keep 'class * implements org.bukkit.command.CommandExecutor' \
          -keepclassmembers 'class * { @org.bukkit.event.EventHandler *; }' \
          -repackageclasses 'a' \
          -allowaccessmodification \
          -optimizationpasses 3
        mv target/antispoof-lite-1.4.7.1-obf.jar target/antispoof-lite-1.4.7.1.jar

    - name: Upload Full Version Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AntiSpoof-Full
        path: target/antispoof-1.4.7.1.jar

    - name: Upload Lite Version Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AntiSpoof-Lite
        path: target/antispoof-lite-1.4.7.1.jar

    - name: Publish to GitHub Packages
      if: github.event_name == 'release'
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Deploy to GitHub Packages
      if: github.event_name == 'release'
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
